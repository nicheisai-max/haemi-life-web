name: Post-Merge Repository Synchronization

on:
  push:
    branches:
      - main

jobs:
  sync:
    name: Canonical Sync
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Execute Guarded Sync
        env:
          CI: true
          SYNC_ALLOWED: true
        run: npm run sync
