name: Bundle Guard

on:
  pull_request:
    branches:
      - main

jobs:
  bundle-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check Bundle Size
        run: |
          SIZE=$(du -sh frontend/dist | cut -f1)
          echo "Bundle size: $SIZE"
