name: Auto-Rollback Protection

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  verify-and-rollback:
    name: Validate & Rollback on Failure
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Root Dependencies
        run: npm ci

      - name: Install Backend Dependencies
        working-directory: ./backend
        run: npm ci

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Parallel CI Execution (Speed Optimized)
        run: npx concurrently "npm run type-check" "npm run lint" "npm run test:ci" "npm --prefix backend run build" "npm --prefix frontend run build"

      - name: Execute Automatic Rollback (main branch only)
        if: failure() && github.ref == 'refs/heads/main'
        run: |
          echo "Validation failed! Initiating automatic rollback of main..."
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git revert HEAD --no-edit
          git push origin main
          echo "Rollback successfully pushed to origin/main."
          exit 1
