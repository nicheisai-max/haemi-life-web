name: Enterprise Integrity Gate

on:
  push:
    branches:
      - main
      - 'ai/**'
  pull_request:
    branches:
      - main

jobs:
  type-safety:
    name: Type Safety Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci && npm --prefix backend ci && npm --prefix frontend ci
      - run: npm run type-check

  lint:
    name: Code Lint Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci && npm --prefix backend ci && npm --prefix frontend ci
      - run: npm run lint

  test:
    name: Parallel Integration Test Pipeline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci && npm --prefix backend ci && npm --prefix frontend ci
      - run: npm run test:ci

  security-audit:
    name: Security Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Run Dependency Audit
        run: npm audit --audit-level=high

  migration-safety:
    name: Migration Safety Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run migration:guard

  build:
    name: Production Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Cache Turborepo and Vite
        uses: actions/cache@v4
        with:
          path: |
            .turbo
            node_modules/.cache
            frontend/node_modules/.cache
            frontend/dist
          key: ${{ runner.os }}-build-cache-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-build-cache-
      - run: npm ci && npm --prefix backend ci && npm --prefix frontend ci
      - run: node scripts/build-performance.js
      - run: node scripts/bundle-guard.js

  ui-baseline:
    name: UI Visual Baseline Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
      - run: npx playwright test
      - name: Upload Screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: test-results/

  ai-intelligence:
    name: AI Development Intelligence
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run Architecture Analyzer
        run: npx tsx scripts/architecture-analyzer.ts
      - name: Run Product Intelligence Engine
        run: npx tsx ai/product-intelligence-engine.ts
      - name: Upload Reports
        uses: actions/upload-artifact@v4
        with:
          name: ai-intelligence-reports
          path: .ai-system/reports/

  auto-rollback:
    name: Auto Rollback Protection
    if: failure() && github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Revert last commit
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git revert HEAD --no-edit
          git commit --amend -m "auto-revert: failed production build safeguard"
          git push

  auto-merge:
    name: GitHub Auto Merge
    if: github.event_name == 'pull_request' && startsWith(github.head_ref, 'ai/') && success()
    needs: [type-safety, lint, test, security-audit, migration-safety, build, ui-baseline, ai-intelligence]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Enable Auto-Merge
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr merge "${{ github.event.pull_request.html_url }}" --auto --merge --delete-branch || echo "Pull request is not mergeable"
