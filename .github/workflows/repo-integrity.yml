name: Enterprise Integrity Gate

on:
  push:
    branches:
      - main
      - 'ai/**'
  pull_request:
    branches:
      - main

jobs:
  integrity-gate:
    name: CI Integrity Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Verify No Worktrees
        run: |
          COUNT=$(git worktree list | wc -l)
          if [ "$COUNT" -gt 1 ]; then
            echo "Enterprise policy violation: extra git worktrees detected."
            git worktree list
            exit 1
          fi

      - name: Install Root Dependencies
        run: npm ci

      - name: Install Backend Dependencies
        working-directory: ./backend
        run: npm ci

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Parallel CI Execution (Speed Optimized)
        run: npx concurrently "npm run type-check" "npm run lint" "npm run test:ci" "npm --prefix backend run build" "npm --prefix frontend run build"
