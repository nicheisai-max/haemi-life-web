name: Enterprise Integrity Gate

on:
  push:
    branches:
      - main
      - 'ai/**'
  pull_request:
    branches:
      - main

jobs:
  dependencies:
    name: Install Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: "package-lock.json"
      - name: Install Dependencies (Workspace Mode)
        run: npm ci --workspaces
      - name: Dependency Drift Protection
        run: npm ci --workspaces --dry-run
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-npm-workspaces-${{ hashFiles('package-lock.json') }}

  lint:
    name: Code Lint Validation
    needs: dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-npm-workspaces-${{ hashFiles('package-lock.json') }}
      - run: npm run lint

  type-check:
    name: Type Safety Validation
    needs: dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-npm-workspaces-${{ hashFiles('package-lock.json') }}
      - run: npm run type-check

  build:
    name: Production Build Check
    needs: dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-npm-workspaces-${{ hashFiles('package-lock.json') }}
      - name: Cache Build Artifacts
        uses: actions/cache@v4
        with:
          path: |
            .turbo
            node_modules/.cache
            frontend/node_modules/.cache
            frontend/dist
          key: ${{ runner.os }}-build-cache-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-build-cache-
      - run: npm run build

  test:
    name: Parallel Integration Tests
    needs: dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-npm-workspaces-${{ hashFiles('package-lock.json') }}
      - run: npm run test:ci

  ui-regression:
    name: UI Visual Baseline Check
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-npm-workspaces-${{ hashFiles('package-lock.json') }}
      - name: Cache Playwright Browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
      - run: npx playwright test
      - name: Upload Screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: test-results/

  ai-intelligence:
    name: AI Development Intelligence
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-npm-workspaces-${{ hashFiles('package-lock.json') }}
      - run: npx tsx scripts/architecture-analyzer.ts
      - run: npx tsx ai/product-intelligence-engine.ts
      - name: Upload Reports
        uses: actions/upload-artifact@v4
        with:
          name: ai-intelligence-reports
          path: .ai-system/reports/

  performance-check:
    name: Performance & Bundle Monitor
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
      - name: Restore Build Artifacts
        uses: actions/cache@v4
        with:
          path: |
            .turbo
            node_modules/.cache
            frontend/node_modules/.cache
            frontend/dist
          key: ${{ runner.os }}-build-cache-${{ github.sha }}
      - name: Check Bundle Size
        run: |
          SIZE=$(du -sh frontend/dist | cut -f1)
          echo "📦 Total Frontend Bundle Size: $SIZE"
          if [[ "$SIZE" == *"M"* ]]; then
            echo "⚠️ Warning: Bundle size exceeds 1MB threshold."
          fi

  auto-merge:
    name: GitHub Auto Merge
    if: github.event_name == 'pull_request' && startsWith(github.head_ref, 'ai/') && success()
    needs: [lint, type-check, build, test, ui-regression, ai-intelligence, performance-check]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Enable Auto-Merge
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr merge "${{ github.event.pull_request.html_url }}" --auto --merge --delete-branch || echo "Pull request is not mergeable"
