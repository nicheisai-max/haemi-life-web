name: Enterprise Integrity Gate

on:
  push:
    branches:
      - main
      - 'ai/**'
  pull_request:
    branches:
      - main

jobs:
  setup:
    name: Prepare Workspace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: |
          npm ci
          npm --prefix backend ci
          npm --prefix frontend ci
  
  type-safety:
    name: Type Safety Validation
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci && npm --prefix backend ci && npm --prefix frontend ci
      - run: npm run type-check

  lint:
    name: Code Lint Validation
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci && npm --prefix backend ci && npm --prefix frontend ci
      - run: npm run lint

  test:
    name: Parallel Integration Test Pipeline
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci && npm --prefix backend ci && npm --prefix frontend ci
      - run: npm run test:ci

  build:
    name: Production Build Check
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci && npm --prefix backend ci && npm --prefix frontend ci
      - run: npm run build

