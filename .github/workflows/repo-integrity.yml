name: Enterprise Integrity Gate

on:
  push:
    branches:
      - main
      - 'ai/**'
  pull_request:
    branches:
      - main

jobs:
  type-safety:
    name: Type Safety Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci && npm --prefix backend ci && npm --prefix frontend ci
      - run: npm run type-check

  lint:
    name: Code Lint Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci && npm --prefix backend ci && npm --prefix frontend ci
      - run: npm run lint

  test:
    name: Parallel Integration Test Pipeline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci && npm --prefix backend ci && npm --prefix frontend ci
      - run: npm run test:ci

  migration-safety:
    name: Migration Safety Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run migration:guard

  build:
    name: Production Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci && npm --prefix backend ci && npm --prefix frontend ci
      - run: npm run build

  auto-merge:
    name: GitHub Auto Merge
    if: github.event_name == 'pull_request' && startsWith(github.head_ref, 'ai/')
    needs: [type-safety, lint, test, migration-safety, build]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Enable Auto-Merge
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr merge "${{ github.event.pull_request.html_url }}" --auto --merge --delete-branch

