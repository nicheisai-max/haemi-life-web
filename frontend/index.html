<head>

  <link rel="apple-touch-icon" sizes="180x180" href="/favicons/favicon-180x180.png" />

  <meta name="theme-color" content="#1BA7A6" />

  
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Haemi Life - Premium Digital Health Platform. Botswana's leading telemedicine and digital health ecosystem." />
  <meta name="keywords" content="health, telemedicine, botswana, doctor, appointment, pharmacy" />
  <meta property="og:title" content="Haemi Life | Premium Digital Health" />
  <meta property="og:description" content="Access Botswana's best doctors and pharmacies instantly." />
  <meta property="og:type" content="website" />
  <title>Haemi Life | Premium Digital Health Platform</title>
  <script>
    // FIX: simple-peer requires 'global' to be defined in Vite/Modern environments
    window.global = window;

    // ZERO-FLASH THEME ENGINE
    (function () {
      try {
        const path = window.location.pathname;
        const isAuthPage = path.includes('/login') || path.includes('/signup') || path.includes('/forgot-password');
        const savedTheme = localStorage.getItem('theme');
        const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

        if (isAuthPage) {
          // Force LIGHT for Botswana Healthcare Branding on Auth Pages
          document.documentElement.classList.add('light');
          document.documentElement.classList.remove('dark');
        } else {
          // Standard Theme Logic for Dashboard
          if (savedTheme === 'dark' || (!savedTheme && systemDark)) {
            document.documentElement.classList.add('dark');
            document.documentElement.classList.remove('light');
          } else {
            document.documentElement.classList.add('light');
            document.documentElement.classList.remove('dark');
          }
        }
      } catch (e) {
        console.error('Theme engine init failed', e);
      }
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>

</body>

</html>
