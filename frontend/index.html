  <script>
    // FIX: simple-peer requires 'global' to be defined in Vite/Modern environments
    window.global = window;

    // ZERO-FLASH THEME ENGINE
    (function () {
      try {
        const path = window.location.pathname;
        const isAuthPage = path.includes('/login') || path.includes('/signup') || path.includes('/forgot-password');
        const savedTheme = localStorage.getItem('theme');
        const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

        if (isAuthPage) {
          // Force LIGHT for Botswana Healthcare Branding on Auth Pages
          document.documentElement.classList.add('light');
          document.documentElement.classList.remove('dark');
        } else {
          // Standard Theme Logic for Dashboard
          if (savedTheme === 'dark' || (!savedTheme && systemDark)) {
            document.documentElement.classList.add('dark');
            document.documentElement.classList.remove('light');
          } else {
            document.documentElement.classList.add('light');
            document.documentElement.classList.remove('dark');
          }
        }
      } catch (e) {
        console.error('Theme engine init failed', e);
      }
    })();
  </script>
</head>
